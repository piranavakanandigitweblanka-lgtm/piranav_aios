# Sajeepan Dashboard — Daily Auto-Update
# Runs every morning at 06:00 UTC (07:00 BST / 11:30 IST)
# Queries ledsone-db-mcp, regenerates sajeepan.html with last-30-day data,
# commits and pushes → Vercel auto-deploys.
#
# SETUP REQUIRED before activating:
# 1. Copy this file to .github/workflows/sajeepan-daily.yml in the Staff-requirements repo
# 2. Add these secrets to that repo (Settings → Secrets → Actions):
#      LEDSONE_DB_HOST, LEDSONE_DB_PORT, LEDSONE_DB_NAME, LEDSONE_DB_USER, LEDSONE_DB_PASSWORD
# 3. Set workflow permissions to Read and Write (Settings → Actions → General)
# 4. Confirm DB is accessible from external IPs (GitHub Actions uses AWS IPs)

name: Sajeepan Dashboard Daily Update

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Staff-requirements repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout piranav_aios (for the update script)
        uses: actions/checkout@v4
        with:
          repository: piranavakanandigitweblanka-lgtm/piranav_aios
          path: piranav_aios
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Run update script
        env:
          LEDSONE_DB_HOST: ${{ secrets.LEDSONE_DB_HOST }}
          LEDSONE_DB_PORT: ${{ secrets.LEDSONE_DB_PORT }}
          LEDSONE_DB_NAME: ${{ secrets.LEDSONE_DB_NAME }}
          LEDSONE_DB_USER: ${{ secrets.LEDSONE_DB_USER }}
          LEDSONE_DB_PASSWORD: ${{ secrets.LEDSONE_DB_PASSWORD }}
        run: python piranav_aios/scripts/sajeepan_update.py

      - name: Commit and push if changed
        run: |
          git config user.name "AIOS Bot"
          git config user.email "aios@ledsone.co.uk"
          git add pages/sajeepan.html
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            DATE=$(date -u '+%Y-%m-%d')
            git commit -m "[AIOS] Sajeepan dashboard auto-update ${DATE} — last 30 days"
            git push origin main
          fi
